# Nginx конфиг для mpi.laprinta.ru
# Скопировать на VPS: sudo cp nginx-mpi.laprinta.ru.conf /etc/nginx/sites-available/mpi.laprinta.ru
# Включить: sudo ln -sf /etc/nginx/sites-available/mpi.laprinta.ru /etc/nginx/sites-enabled/
# Проверка: sudo nginx -t
# Перезагрузка: sudo systemctl reload nginx
#
# HTTPS: sudo certbot --nginx -d mpi.laprinta.ru
# После certbot certbot сам добавит блок listen 443 ssl и пути к сертификатам.
# Ниже — пример полного конфига с HTTPS (certbot может править файл по-своему).
# Загрузка STL до 50 МБ: client_max_body_size 50M в оба блока server.

server {
    listen 80;
    server_name mpi.laprinta.ru;
    # Редирект HTTP → HTTPS (раскомментировать после настройки SSL)
    # return 301 https://$server_name$request_uri;
    client_max_body_size 50M;
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}

